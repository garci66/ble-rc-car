    function setBatteryPct(pct){
        batText=document.getElementById('batteryText');
        batLevel=document.getElementById('batteryLevel');
        pct=pct>100?100:pct;
        pct=pct<0?0:pct;
        batLevel.style.height=`${pct}%`;
        batText.innerHTML=`${Math.round(pct)}`

        if (pct<20){
            if(pct<10){
                batLevel.classList.remove('warn');
                batLevel.classList.add('alert');
            } else {
                batLevel.classList.remove('alert');
                batLevel.classList.add('warn');
            }
        } else {
            batLevel.classList.remove('alert');
            batLevel.classList.remove('warn');    
        }
    }

    function approximateOutput(input, data) {
        // data  is an array of size n with an input field and and output field. It must me sorted.    
        // If the input is out of the bounds, return the lowest or highest value accordingly
        if (input <= data[0].input) {
            return data[0].output;
        }
        if (input >= data[data.length - 1].input) {
            return data[data.length - 1].output;
        }

        // Iterate through the data to find the appropriate range
        for (let i = 0; i < data.length - 1; i++) {
            const point1 = data[i];
            const point2 = data[i + 1];
            
            // Check if the input lies between point1 and point2
            if (input >= point1.input && input <= point2.input) {
                // Linear interpolation formula
                const slope = (point2.output - point1.output) / (point2.input - point1.input);
                const output = point1.output + slope * (input - point1.input);
                return output;
            }
        }
    }

    function calcBatteryLevel(voltage){
        //Takes the "voltage" value from the mikrotik health report and returns the battery charge percentage
        packVoltage=(voltage+2.8834)/1.0611; //from tests ran - see excel in source code
        cellVoltage=packVoltage/5; //5 cells per pack
        chargePct = approximateOutput(cellVoltage, sortedBattArray);
        console.debug(`BAT;TS:${getDateTime()};Raw Voltage:${voltage};pack voltage:${packVoltage};cell voltage:${cellVoltage};charge:${chargePct}`)
        return chargePct
    }

        if (bleServer && bleServer.connected){
            if (delta>30){
                topnavContainer.style.backgroundColor="#f8d300;"
                bleStateContainer.innerHTML='Conectado a ' + bleDeviceName +"<br>NO SE RECIBEN DATOS<br>DESCONECTAR Y VOLVER A CONECTAR!"

            }
        } else {

                resetSFPFormat();

        healtTimestampContainer.innerHTML=healthDelta

            healthCard.style.backgroundColor = '#fcff33';
        } else {

    // Connect Button (search for BLE Devices only if BLE is available)
    connectButton.addEventListener('click', (event) => {
        if (isWebBluetoothEnabled()){
            connectToDevice();
        }
    });

    // Disconnect Button
    disconnectButton.addEventListener('click', disconnectDevice);

    // Write to the ESP32 LED Characteristic
    onButton.addEventListener('click', () => writeOnCharacteristic(1));
    offButton.addEventListener('click', () => writeOnCharacteristic(0));

    // Check if BLE is available in your Browser
    function isWebBluetoothEnabled() {
        if (!navigator.bluetooth) {
            console.log('Web Bluetooth API is not available in this browser!');
            bleStateContainer.innerHTML = "Web Bluetooth API is not available in this browser/device!";
            return false
        }
        console.log('Web Bluetooth API supported in this browser.');
        return true
    }

    // Connect to BLE Device and Enable Notifications
    function connectToDevice(){
        console.log('Initializing Bluetooth...');
        var myBlePrimaryService = navigator.bluetooth.requestDevice({
            filters: [{namePrefix: deviceNamePrefix}],
            optionalServices: [bleService]
        })
        .then(device => {
            console.log('Device Selected:', device.name);
            bleDeviceName=device.name;
            lastNeighborTime=new Date();
            bleStateContainer.innerHTML = 'Conectado a ' + bleDeviceName;
            topnavContainer.style.backgroundColor = "#24af37";
            device.addEventListener('gattservicedisconnected', onDisconnected);
            return device.gatt.connect();
        })
        .then(gattServer =>{
            bleServer = gattServer;
            console.log("Connected to GATT Server");
            return bleServer.getPrimaryService(bleService);
        })

        myBlePrimaryService.then(service => {
            bleServiceFound = service;
            console.log("Service discovered:", service.uuid);
            return service.getCharacteristic(neighborCharacteristic);
        })
        .then(characteristic => {
            console.log("Characteristic discovered:", characteristic.uuid);
            neighborCharacteristicFound = characteristic;
            characteristic.addEventListener('characteristicvaluechanged', handleNeighborCharacteristicChange);
            characteristic.startNotifications();
            console.log("Notifications Started.");
            return characteristic.readValue();
        })
        .then(value => {
            console.debug("Read value: ", value);
            const decodedValue = new TextDecoder().decode(value);
            console.debug("Decoded value: ", decodedValue);
            //retrievedValue.innerHTML = decodedValue;            
        })
        .catch(error => {
            console.log('Error: ', error);
        });

        myBlePrimaryService.then(service => {
            bleServiceFound = service;
            console.log("Service discovered:", service.uuid);
            return service.getCharacteristic(healthCharacteristic);
        })
        .then(characteristic => {
            console.log("Characteristic discovered:", characteristic.uuid);
            healthCharacteristicFound = characteristic;
            characteristic.addEventListener('characteristicvaluechanged', handleHealthCharacteristicChange);
            characteristic.startNotifications();
            console.log("Notifications Started.");
            return characteristic.readValue();
        })
        .then(value => {
            console.log("Read value: ", value);
            const decodedValue = new TextDecoder().decode(value);
            console.log("Decoded value: ", decodedValue);
            retrievedValue.innerHTML = decodedValue;            
        })
        .catch(error => {
            console.log('Error: ', error);
        });

    }

    function onDisconnected(event){
        console.log('Device Disconnected:', event.target.device.name);
        bleStateContainer.innerHTML = "Dispositivo Desconectado";
        topnavContainer.style.backgroundColor = "#d13a30";

        connectToDevice();
    }

    function handleNeighborCharacteristicChange(event){
        const newValueReceived = new TextDecoder().decode(event.target.value);
        // TODO DEBUG
        console.debug("Characteristic value changed: ", newValueReceived);
        mkRespObj=JSON.parse(newValueReceived);
        console.debug(newValueReceived);
        if ('N' in mkRespObj){  //We're dealing with a Neighbor advertisement
            thisObj=mkRespObj['N'];
            for ( [key,val] of Object.entries(thisObj)){
                    //console.log(key, val);
                    localPort=document.getElementById(key)
                    remPort=document.getElementById('n'+key)
                    powPort=document.getElementById('p'+key)
                    tempPort=document.getElementById('t'+key)
                    ageVal=val['Z'==1]?"XXX":val['A']
                    powerPortVal=`${(val['L']/10).toFixed(1)} dBm<br/>Antig ${ageVal} s.`
                    powPort.innerHTML=powerPortVal;
                    remPort.innerHTML=val['R'];
                    if ('T' in val){
                        tempPort.innerHTML=`${val['T']} &degc`
                        if (val['T']>70){
                            tempPort.style.backgroundColor = "#fcff33";
                        } else {
                            tempPort.style.backgroundColor = null;
                        }
                    } else {
                        tempPort.style.backgroundColor = null;
                        tempPort.innerHTML="NaN"
                    }
                    if ('M' in val && val['M']==0){
                        // SFP not detected - alert!!
                        localPort.style.backgroundColor = "#f633ff";
                        powPort.innerHTML="ERR<br>SFP!!";
                        remPort.innerHTML="ERR<br>SFP!!";
                        tempPort.innerHTML="ERR!!";
                    } else if ('F' in val && val['F']) {
                        // TX Fault in SFP
                        localPort.style.backgroundColor = "#f633ff";
                        remPort.innerHTML="ERR<br>TX!!"
                    } else if (val['S']==false){
                        // Link down
                        localPort.style.backgroundColor = "#8a8a8a";
                    } else if (val['Z']==false){
                        // Link up but no LLDP data
                        remPort.innerHTML="S/D!"
                        localPort.style.backgroundColor = "#fcff33";
                    } else {
                        if (key==val['R']){
                            // LLDP PORT matches
                            localPort.style.backgroundColor  = "#24af37";
                        } else {
                            // LLDP PORT MISMATCH
                            localPort.style.backgroundColor = "#d13a30";
                        }
                    }

                }
            if ("NS" in mkRespObj){
                // New format with sequence number (NS)
                if (mkRespObj['NS']==1){
                    neighboRetrievedValue1.innerHTML = newValueReceived;
                } else {
                    neighboRetrievedValue2.innerHTML = newValueReceived;
                }
            } else {
                // old format without sequence number (NS)
                neighboRetrievedValue1.innerHTML = newValueReceived;
            }
            
            lastNeighborTime=new Date();
            neighborTimestampContainer.innerHTML = getDateTime();
        }
        if ('R' in mkRespObj){  //We're dealing with a remote SFP info
            thisObj=mkRespObj['R'];
            for ( [key,val] of Object.entries(thisObj)){
                    //console.log(key, val);
                    localPort=document.getElementById('R'+key)
                    powPort=document.getElementById('rS'+key)
                    //show remote tx power and temperature
                    powerPortVal=`${(val['L']/10).toFixed(1)} dBm<br/>${val['T']}&deg;C`
                    powPort.innerHTML=powerPortVal;
                    if ('M' in val && val['M']==0){
                        // SFP not detected - alert!!
                        localPort.style.backgroundColor = "#f633ff";
                        powPort.innerHTML="ERR<br>SFP!!";
                    } else if ('F' in val && val['F']) {
                        // TX Fault in SFP
                        localPort.style.backgroundColor = "#f633ff";
                        powPort.innerHTML="ERR<br>TX!!"
                    } else if ('T' in val && (val['T']>70 || val['T']<5) ) {
                        // Out of temperature - waring
                        localPort.style.backgroundColor = "#fcff33";
                        powPort.innerHTML="ERR<br>TX!!"
                    } else {
                        // OK? 
                        localPort.style.backgroundColor = "#24af37";
                    }
                }
                sfpRetrievedValue.innerHTML = newValueReceived;
            lastRemSfpTime=new Date();
        }
        if ("H" in mkRespObj){ //We're dealing with a  Health advertisement
            thisObj=mkRespObj['H'];
            innerHTML='';
            for ( [key,val] of Object.entries(thisObj)){
                innerHTML+=`${key} = ${val}<br/>`
            }
            if ('voltage' in thisObj){
                innerHTML+=`Battery: ${Math.round(calcBatteryLevel(thisObj['voltage']))}%<br/>`;
                setBatteryPct(calcBatteryLevel(thisObj['voltage']));
            }
            healthRetrievedValue.innerHTML=innerHTML;
            lastHealthTime=new Date();
        }
        if ("HR" in mkRespObj){ //We're dealing with a  Health advertisement
            thisObj=mkRespObj['HR'];
            innerHTML='';
            for ( [key,val] of Object.entries(thisObj)){
                innerHTML+=`${key} = ${val}<br/>`
            }
            if ('voltage' in thisObj){
                innerHTML+=`Battery: ${Math.round(calcBatteryLevel(thisObj['voltage']))}%<br/>`;
            }
            healthRemRetrievedValue.innerHTML=innerHTML;
            lastRemHealthTime=new Date();
        }
    }

    function handleHealthCharacteristicChange(event){
        const newValueReceived = new TextDecoder().decode(event.target.value);
        console.log("Characteristic value changed: ", newValueReceived);
        console.log(newValueReceived);
        mkRespObj=JSON.parse(newValueReceived);
        innerHTML='';
        for ( [key,val] of Object.entries(mkRespObj)){
            innerHTML+=`${key} = ${val}<br/>`
        }
        healthRetrievedValue.innerHTML=innerHTML;
        healtTimestampContainer.innerHTML = getDateTime();
    }

    function writeOnCharacteristic(value){
        if (bleServer && bleServer.connected) {
            bleServiceFound.getCharacteristic(ledCharacteristic)
            .then(characteristic => {
                console.log("Found the LED characteristic: ", characteristic.uuid);
                const data = new Uint8Array([value]);
                return characteristic.writeValue(data);
            })
            .then(() => {
                latestValueSent.innerHTML = value;
                console.log("Value written to LEDcharacteristic:", value);
            })
            .catch(error => {
                console.error("Error writing to the LED characteristic: ", error);
            });
        } else {
            console.error ("Bluetooth is not connected. Cannot write to characteristic.")
            window.alert("Bluetooth is not connected. Cannot write to characteristic. \n Connect to BLE first!")
        }
    }

    function disconnectDevice() {
        console.log("Disconnect Device.");
        if (bleServer && bleServer.connected) {
            if (neighborCharacteristicFound) {
                neighborCharacteristicFound.stopNotifications()
                    .then(() => {
                        console.log("Notifications Stopped");
                        return bleServer.disconnect();
                    })
                    .then(() => {
                        console.log("Device Disconnected");
                        bleStateContainer.innerHTML = "Dispositivo Desconectado";
                        topnavContainer.style.backgroundColor = "#d13a30";

                    })
                    .catch(error => {
                        console.log("An error occurred:", error);
                    });
            } else {
                console.log("No characteristic found to disconnect.");
            }
        } else {
            // Throw an error if Bluetooth is not connected
            console.error("Bluetooth is not connected.");
            window.alert("Bluetooth no esta conectado.")
        }
    }

        var currentdate = new Date();
        //var day = ("00" + currentdate.getDate()).slice(-2); // Convert day to string and slice
        //var month = ("00" + (currentdate.getMonth() + 1)).slice(-2);

        //var minutes = ("00" + currentdate.getMinutes()).slice(-2);
        //var seconds = ("00" + currentdate.getSeconds()).slice(-2);
        
        //var datetime = day + "/" + month + "/" + year + " at " + hours + ":" + minutes + ":" + seconds;
        return currentdate.toLocaleString();
    }
